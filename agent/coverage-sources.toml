version = 1

# Coverage / proof artifact sources parsed by `jankurai coverage audit`.
# This config makes the `coverage-evidence` tool-adoption catalog entry applicable
# and lets CI parse line-coverage + mutation artifacts produced by the test lanes.
# `jankurai coverage audit` only PARSES these artifacts; it never runs tests.

[[source]]
id = "rust-lcov"
kind = "line_coverage"
format = "lcov"
mode = "auto"
owner = "tools"
lane = "coverage-audit"
artifacts = ["target/llvm-cov/lcov.info", "target/jankurai/coverage/rust-lcov.info"]
applies_to = ["crates/**/*.rs"]
rules = ["HLT-008-FALSE-GREEN-RISK"]
hard_changed_line_coverage = 0.90
soft_total_line_coverage = 0.75

[[source]]
id = "rust-mutation"
kind = "mutation"
format = "cargo-mutants-json"
mode = "auto"
owner = "tools"
lane = "coverage-audit"
artifacts = ["target/mutants/mutants.out/outcomes.json", "target/mutants/outcomes.json"]
applies_to = ["crates/**/*.rs"]
rules = ["HLT-008-FALSE-GREEN-RISK"]
hard_survivors_on_changed_paths = 1
