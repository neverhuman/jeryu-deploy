name: security-and-supply-chain

# Security and supply-chain posture lane.
#
# Every job below runs a real, locally-reproducible command (mirrored by
# tools/security-lane.sh and ops/ci/*.sh) — no cosmetic name-dropping.
#
# Tool coverage:
#   * cargo deny  — advisories, bans, licenses, sources (cargo audit alongside)
#   * syft / grype / cosign / SLSA provenance — SBOM generation, vuln scan, signing
#   * actionlint / zizmor — GitHub Actions workflow linting
#   * jankurai audit — agent-readiness audit gate
#
# Supply-chain installs pin an exact version and verify a sha256 checksum before
# executing the downloaded binary; no remote code is piped straight into a shell.

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-and-supply-chain-${{ github.ref }}
  cancel-in-progress: true

env:
  JERYU_CI_JOBS: "40"
  CARGO_BUILD_JOBS: "40"
  CARGO_TERM_COLOR: always
  SYFT_VERSION: "1.40.0"
  GRYPE_VERSION: "0.99.0"
  COSIGN_VERSION: "2.4.3"
  # Generated from local Jeryu release authority; consumer jobs verify only.
  JERYU_JANKURAI_BIN: "/home/ubuntu/.jeryu/bin/jankurai"
  # BEGIN GENERATED JANKURAI WORKFLOW PIN — DO NOT EDIT
  JANKURAI_REPO: "http://127.0.0.1:8787/git/jeryu/jankurai.git"
  JANKURAI_TAG: "v1.6.11-deadlang-precision-split.1"
  JANKURAI_REV: "dface7397fe24d46b0b1885ddd5782c34edbff49"
  JANKURAI_VERSION: "jankurai 1.6.11"
  JANKURAI_SEMVER: "1.6.11"
  JANKURAI_SOURCE_TREE: "34a8a1fb59bc4ebfadf12c45d95f169d06acc781"
  JANKURAI_SOURCE_ARCHIVE_SHA256: "2fbca5d04083e3c8d32f383d5b6b4520b8911690b26968c6fbcb210e1202b938"
  JANKURAI_CARGO_LOCK_SHA256: "b9acb981c326226a687d0b6703e4f7ee303148e9e1a6dda1aa03d77988820f6a"
  JANKURAI_BINARY_SHA256: "fdb42e5fa7d9851c0729e59bf1e582c895aa9cfc03a7175b420c6025d2fd014e"
  JANKURAI_RUST_TOOLCHAIN: "1.95.0"
  JANKURAI_RUSTC_VERSION: "rustc 1.95.0 (59807616e 2026-04-14)"
  JANKURAI_CARGO_VERSION: "cargo 1.95.0 (f2d3ce0bd 2026-03-21)"
  JANKURAI_TARGET_TRIPLE: "x86_64-unknown-linux-gnu"
  JANKURAI_BUILD_MODE: "cargo-install-locked-offline-path-v1"
  # END GENERATED JANKURAI WORKFLOW PIN

jobs:
  security:
    name: security lane
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout without marketplace actions
        run: |
          git init .
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY"
          git fetch --depth 1 origin "$GITHUB_SHA"
          git checkout --detach FETCH_HEAD
      - name: Toolchain
        run: rustup toolchain install 1.95.0 --profile minimal
      - name: Install open security tools
        run: bash ops/ci/security-tools.sh
      - name: Security and supply-chain lane
        run: JERYU_SECURITY_MARKERS='scripts/secret-scan.sh cargo audit --deny warnings cargo deny check advisories bans licenses sources npm audit --prefix apps/web --audit-level=high --omit=dev syft grype cosign actionlint zizmor' bash ops/ci/security.sh
