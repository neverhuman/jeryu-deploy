name: release

on:
  push:
    tags: ['jeryu-deploy-v*']
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  JERYU_CI_JOBS: "40"
  CARGO_BUILD_JOBS: "40"
  JERYU_CI_USE_SCCACHE: "0"
  # Generated from local Jeryu release authority; consumer jobs verify only.
  JERYU_JANKURAI_BIN: "/home/ubuntu/.jeryu/bin/jankurai"
  # BEGIN GENERATED JANKURAI WORKFLOW PIN — DO NOT EDIT
  JANKURAI_REPO: "http://127.0.0.1:8787/git/jeryu/jankurai.git"
  JANKURAI_TAG: "v1.6.11-deadlang-precision-split.1"
  JANKURAI_REV: "dface7397fe24d46b0b1885ddd5782c34edbff49"
  JANKURAI_VERSION: "jankurai 1.6.11"
  JANKURAI_SEMVER: "1.6.11"
  JANKURAI_SOURCE_TREE: "34a8a1fb59bc4ebfadf12c45d95f169d06acc781"
  JANKURAI_SOURCE_ARCHIVE_SHA256: "2fbca5d04083e3c8d32f383d5b6b4520b8911690b26968c6fbcb210e1202b938"
  JANKURAI_CARGO_LOCK_SHA256: "b9acb981c326226a687d0b6703e4f7ee303148e9e1a6dda1aa03d77988820f6a"
  JANKURAI_BINARY_SHA256: "fdb42e5fa7d9851c0729e59bf1e582c895aa9cfc03a7175b420c6025d2fd014e"
  JANKURAI_RUST_TOOLCHAIN: "1.95.0"
  JANKURAI_RUSTC_VERSION: "rustc 1.95.0 (59807616e 2026-04-14)"
  JANKURAI_CARGO_VERSION: "cargo 1.95.0 (f2d3ce0bd 2026-03-21)"
  JANKURAI_TARGET_TRIPLE: "x86_64-unknown-linux-gnu"
  JANKURAI_BUILD_MODE: "cargo-install-locked-offline-path-v1"
  # END GENERATED JANKURAI WORKFLOW PIN

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout without marketplace actions
        run: |
          git init .
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY"
          git fetch --depth 1 origin "$GITHUB_SHA"
          git checkout --detach FETCH_HEAD
      - name: Toolchain
        run: rustup toolchain install 1.95.0 --profile minimal
      - name: Verify governed Jankurai
        run: bash ops/ci/ensure-jankurai.sh
      - name: Security toolchain (syft/grype/cosign)
        run: bash ops/ci/security-tools.sh
      - name: Release build + SBOM + cosign sign + publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash ops/ci/release.sh
