name: proof-evidence

# Jankurai tool-adoption CI lane: runs the local evidence lane and uploads the
# catalog artifact paths. The exact catalog command strings also live in
# ops/ci/proof-evidence.sh so thin workflow parity and adoption evidence agree.
#
# The job is THIN: the real command sequence lives in ops/ci/proof-evidence.sh
# so CI and local runs share a single source of truth (local/CI parity).

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: proof-evidence-${{ github.ref }}
  cancel-in-progress: true

env:
  JERYU_JANKURAI_BASE_REF: "origin/main"
  # Generated from local Jeryu release authority; consumer jobs verify only.
  JERYU_JANKURAI_BIN: "/home/ubuntu/.jeryu/bin/jankurai"
  # BEGIN GENERATED JANKURAI WORKFLOW PIN — DO NOT EDIT
  JANKURAI_REPO: "http://127.0.0.1:8787/git/jeryu/jankurai.git"
  JANKURAI_TAG: "v1.6.11-deadlang-precision-split.1"
  JANKURAI_REV: "dface7397fe24d46b0b1885ddd5782c34edbff49"
  JANKURAI_VERSION: "jankurai 1.6.11"
  JANKURAI_SEMVER: "1.6.11"
  JANKURAI_SOURCE_TREE: "34a8a1fb59bc4ebfadf12c45d95f169d06acc781"
  JANKURAI_SOURCE_ARCHIVE_SHA256: "2fbca5d04083e3c8d32f383d5b6b4520b8911690b26968c6fbcb210e1202b938"
  JANKURAI_CARGO_LOCK_SHA256: "b9acb981c326226a687d0b6703e4f7ee303148e9e1a6dda1aa03d77988820f6a"
  JANKURAI_BINARY_SHA256: "fdb42e5fa7d9851c0729e59bf1e582c895aa9cfc03a7175b420c6025d2fd014e"
  JANKURAI_RUST_TOOLCHAIN: "1.95.0"
  JANKURAI_RUSTC_VERSION: "rustc 1.95.0 (59807616e 2026-04-14)"
  JANKURAI_CARGO_VERSION: "cargo 1.95.0 (f2d3ce0bd 2026-03-21)"
  JANKURAI_TARGET_TRIPLE: "x86_64-unknown-linux-gnu"
  JANKURAI_BUILD_MODE: "cargo-install-locked-offline-path-v1"
  # END GENERATED JANKURAI WORKFLOW PIN

jobs:
  tool-adoption-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout without marketplace actions
        run: |
          git init .
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY"
          git fetch --no-tags --depth 64 origin "$GITHUB_REF"
          git checkout --detach FETCH_HEAD
          git fetch --no-tags --depth 64 origin refs/heads/main:refs/remotes/origin/main

      - name: Toolchain
        run: rustup toolchain install 1.95.0 --profile minimal

      - name: Verify governed Jankurai
        run: bash ops/ci/ensure-jankurai.sh

      - name: Tool-adoption evidence lane (local/CI parity)
        run: bash ops/ci/proof-evidence.sh

      # Upload every wired tool's artifact_paths. `if: always()` so evidence is
      # captured even when the ratchet score gate fails.
      - name: Upload tool-adoption evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: jankurai-tool-adoption-evidence
          path: |
            .jankurai/repo-score.json
            .jankurai/repo-score.md
            target/jankurai/repo-score.json
            target/jankurai/repo-score.md
            target/jankurai/repair-queue.jsonl
            target/jankurai/security/evidence.json
            target/jankurai/proofbind/surface-witness.json
            target/jankurai/proofbind/obligations.json
            target/jankurai/proofmark/proofmark-receipt.json
            target/jankurai/proofmark/proof-receipt.json
            target/jankurai/copy-code.json
            target/jankurai/copy-code.md
            target/jankurai/language-bad-behavior.log
            target/jankurai/rust/witness-graph.json
            target/jankurai/ux-qa.json
            target/jankurai/migration-report.json
            target/jankurai/vibe-coverage.json
            target/jankurai/vibe-coverage.md
            target/jankurai/coverage/coverage-audit.json
            target/jankurai/coverage/coverage-audit.md
          if-no-files-found: error
